version: "3.9"

services:
  dblens:
    build: .
    container_name: dblens-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"           # Web dashboard
      - "9090:9090"           # Prometheus metrics (if enabled)
    volumes:
      - ./config:/app/config  # Mount your config.json here
      - ./data:/app/data      # Persistent history + logs
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/results"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Prometheus scraping DBLens metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: dblens-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    profiles:
      - monitoring    # only start with: docker compose --profile monitoring up

  # Optional: Grafana for advanced visualisation
  grafana:
    image: grafana/grafana:latest
    container_name: dblens-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dblens2024
    volumes:
      - grafana_data:/var/lib/grafana
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
